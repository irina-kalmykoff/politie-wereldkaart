<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Politie Wereldkaart — taalspel over de wereld 🌍👮</title>
  <meta name="description" content="Klik op een land en los Nederlandse taalopdrachten over de politie op. 95 landen, 4 niveaus — voor taalontwikkeling." />

  <!-- Deelbare voorvertoning (Open Graph — WhatsApp, Slack, Facebook, LinkedIn) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://wereldpolitie.netlify.app/" />
  <meta property="og:title" content="Politie Wereldkaart — taalspel over de wereld 🌍👮" />
  <meta property="og:description" content="Klik op een land en los Nederlandse taalopdrachten over de politie op. 95 landen, 4 niveaus." />
  <meta property="og:image" content="https://wereldpolitie.netlify.app/preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Politie Wereldkaart — een interactieve wereldkaart met taalopdrachten" />
  <meta property="og:locale" content="nl_NL" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Politie Wereldkaart — taalspel over de wereld 🌍👮" />
  <meta name="twitter:description" content="Klik op een land en los taalopdrachten over de politie op. 95 landen, 4 niveaus." />
  <meta name="twitter:image" content="https://wereldpolitie.netlify.app/preview.png" />

  <!-- Leaflet (kaartbibliotheek) — gebruikt vanaf stap 2 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Leesbaar lettertype voor de doelgroep -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Ontdek de politie van de wereld 🌍👮</h1>
    <p class="ondertitel">Klik op een land en los de taalopdracht op. Goed? Dan krijgt het land zijn vlag! 🏳️</p>
    <div class="header-status">
      <span id="vlag-teller" class="vlag-teller"></span>
      <label class="stem-kiezer">🔊
        <select id="stem-select" aria-label="Kies een stem voor het voorlezen"></select>
      </label>
      <button id="reset-knop" class="reset-knop" title="Begin opnieuw (wis alle vlaggen)">↺ Opnieuw</button>
    </div>
  </header>

  <main>
    <!-- Leaflet vult deze container met de kaart (zie js/map.js) -->
    <div id="map"></div>
  </main>

  <!-- Het opdracht-venster (popup) — wordt gevuld vanaf stap 3 -->
  <div id="task-popup" class="hidden" role="dialog" aria-modal="true" aria-labelledby="popup-titel"></div>

  <!-- Scripts: volgorde is belangrijk -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
