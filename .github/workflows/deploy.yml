name: Deploy naar GitHub Pages

# Publiceert de statische site bij elke push naar main.
# Zet GitHub Pages automatisch aan (enablement: true), dus je hoeft niets
# in Settings → Pages te wijzigen.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechten die de deploy nodig heeft
permissions:
  contents: read
  pages: write
  id-token: write

# Eén deploy tegelijk; lopende run niet afbreken
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Pages configureren (en aanzetten)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Site inpakken (hele projectmap)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deployen naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
